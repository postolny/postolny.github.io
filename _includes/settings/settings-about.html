<div class="panel-item toggle">
  <label class="switch">
    <input type="checkbox" id="clouds-toggle">
    <span class="slider"></span>
  </label>
  <span>облака</span></div>
<div class="panel-item range">
  <label>Скорость облаков</label>
  <input type="range" id="cloud-speed" min="0.1" max="3" step="0.1" value="1">
</div>
<div class="panel-item range">
  <label>Количество облаков</label>
  <input type="range" id="clouds-count" min="10" max="150" step="1">
</div>
<div class="panel-item toggle">
  <label class="switch">
    <input type="checkbox" id="birds-toggle">
    <span class="slider"></span>
  </label>
  <span>птицы</span></div>
<div class="panel-item range">
  <label>Скорость птиц</label>
  <input type="range" id="birds-speed" min="0.2" max="1.5" step="0.1" value="1">
</div>
<div class="panel-item range">
  <label>Количество птиц</label>
  <input type="range" id="birds-count" min="1" max="20" step="1" value="5">
</div>
