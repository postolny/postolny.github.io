# Site settings
title:          Блог
description:    "Игорь Постольный • L'Italiano"
baseurl:        ""
url:            "https://postolny.github.io"

defaults:
  - scope:
      path: ""
    values:
      image:     /assets/Rome-Parco-degli-Acquedotti1200x627.jpg

# Google Analytics
google_analytics:

# Author
author:
  name:         Игорь Постольный
  url:          
  email:        

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       10
seo_paginator_message: "Страница %<current>s | "

# Excludes
exclude: [ Gemfile, Gemfile.lock, tale.gemspec ]

# Disqus (Set to your disqus id)
disqus:
