---
layout: default
---

<div class="page">
  {% unless page.exclude_page_info %}
  <div class="page-info">
    <span>Автор</span>
    {% if page.author %}
    {{ page.author }}
    {% else %}
    {{ site.author.name }}
    {% endif %}
  </div>
  {% endunless %}
  <h1 class="page-title">{{ page.title }}</h1>
  {{ content }}
</div>
